# Stage C — Teacher SFT (Supervised Fine-Tuning)
# Qwen2.5-1.5B fine-tuned with Unsloth + LoRA on clinical data

model:
  name: "${TEACHER_MODEL}"
  max_seq_length: 2048
  dtype: "float16"
  load_in_4bit: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: "./outputs/stage_c"
  epochs: 3
  per_device_train_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 50
  eval_steps: 50
  fp16: true
  gradient_checkpointing: true

data:
  train_path: "data/processed/train.jsonl"
  eval_path: "data/processed/eval.jsonl"
  max_length: 2048

s3:
  upload_checkpoint: true
  cleanup_after_upload: true
  prefix: "checkpoints"
